<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>Sonic Wave: Ultimate Drip Edition</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <style>
       body {
           margin: 0;
           overflow: hidden;
           background-color: #020617;
           touch-action: none;
           font-family: 'Inter', system-ui, -apple-system, sans-serif;
           user-select: none;
       }
       canvas { display: block; }
      
       #game-ui {
           position: absolute;
           inset: 0;
           z-index: 20;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           background: rgba(2, 6, 23, 0.85);
           color: white;
           text-align: center;
           overflow-y: auto;
           padding: 20px;
       }
      
       #hud {
           position: absolute;
           top: 20px;
           left: 20px;
           z-index: 10;
           pointer-events: none;
       }


       .ai-btn {
           background: #6366f1;
           color: white;
           font-weight: bold;
           padding: 10px 20px;
           border-radius: 12px;
           pointer-events: auto;
           border: 2px solid #818cf8;
           cursor: pointer;
           transition: all 0.2s;
       }
       .ai-btn:hover { transform: scale(1.05); background: #4f46e5; }
       .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }


       .launch-btn {
           background: linear-gradient(135deg, #22d3ee, #6366f1);
           color: white;
           font-size: 1.2rem;
           font-weight: 900;
           padding: 12px 35px;
           border-radius: 99px;
           margin-top: 10px;
           border: 4px solid rgba(255,255,255,0.2);
           cursor: pointer;
           box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
           animation: pulse-glow 2s infinite;
       }


       @keyframes pulse-glow {
           0% { transform: scale(1); box-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
           50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(34, 211, 238, 0.7); }
           100% { transform: scale(1); box-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
       }


       #shop-scroll-area {
           max-height: 250px;
           overflow-y: auto;
           background: rgba(255, 255, 255, 0.03);
           border: 1px solid rgba(255, 255, 255, 0.1);
           border-radius: 20px;
           padding: 15px;
           display: grid;
           grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
           gap: 12px;
           width: 100%;
           scrollbar-width: thin;
           scrollbar-color: #22d3ee transparent;
       }


       .shop-card {
           background: rgba(255, 255, 255, 0.05);
           border: 1px solid rgba(255, 255, 255, 0.1);
           border-radius: 16px;
           padding: 10px;
           display: flex;
           flex-direction: column;
           align-items: center;
           gap: 5px;
       }


       .admin-entry {
           font-weight: 900;
           animation: ultimate-glow 1s infinite alternate;
           background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
           background-size: 400% 400%;
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;
       }
      
       @keyframes ultimate-glow {
           0% { background-position: 0% 50%; filter: drop-shadow(0 0 5px #fff); }
           100% { background-position: 100% 50%; filter: drop-shadow(0 0 20px #22d3ee); }
       }
      
       .hidden { display: none !important; }


       .cheat-input {
           background: rgba(255,255,255,0.1);
           border: 1px solid rgba(255,255,255,0.2);
           border-radius: 8px;
           padding: 6px 12px;
           color: #4ade80;
           font-family: monospace;
           text-align: center;
           outline: none;
           width: 100%;
           max-width: 180px;
           margin-top: 5px;
       }


       .coin-icon { display: inline-block; animation: coin-spin 2s infinite linear; color: #facc15; text-shadow: 0 0 10px #facc15; }
       @keyframes coin-spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
   </style>
</head>
<body>


   <div id="hud">
       <div id="score-display" class="text-3xl font-black text-white tabular-nums">0</div>
       <div class="flex items-center gap-2 mt-1">
           <span class="coin-icon text-2xl">🟡</span>
           <span id="coin-count" class="text-2xl font-black text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.8)]">0</span>
       </div>
       <div id="mult-display" class="text-lg font-black text-yellow-400 hidden">1X</div>
       <div id="active-powers" class="flex flex-col items-start mt-2"></div>
   </div>


   <div id="game-ui">
       <h1 id="galaxy-name" class="text-xs uppercase tracking-[0.4em] text-indigo-400 mb-1 font-bold italic">BILLIONAIRE GALAXY</h1>
       <h1 id="main-title" class="text-3xl font-black mb-3 text-cyan-400 italic">SONIC WAVE</h1>
      
       <div id="shop-container" class="mb-4 w-full max-w-xl">
           <p class="text-[10px] text-white/50 mb-2 font-bold uppercase tracking-widest text-center">🛒 Mega-Mall: 1,000 Powers Available</p>
           <div id="shop-scroll-area"></div>
       </div>


       <div class="mb-4">
           <p class="text-[10px] text-white/40 uppercase tracking-widest mb-1">Encrypted Access Console</p>
           <input type="password" id="cheat-box" class="cheat-input" placeholder="••••••••••••" maxlength="15">
           <p id="cheat-status" class="text-[10px] mt-1 text-white/20 italic">Awaiting clearance...</p>
       </div>


       <button id="start-button" class="launch-btn mb-4">LAUNCH MISSION</button>
      
       <button id="terraform-btn" class="ai-btn mb-4 text-[10px] py-1">✨ TERRAFORM REALITY</button>
      
       <div class="bg-white/5 p-3 rounded-2xl border border-white/10 w-full max-w-xs">
           <h2 class="text-[10px] uppercase tracking-widest text-cyan-500 font-bold mb-2 text-left px-1">Cosmic Rankings</h2>
           <div id="leaderboard-list" class="space-y-1 text-left"></div>
       </div>
   </div>


   <canvas id="gameCanvas"></canvas>


   <script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
       import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
       import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";


       // --- GLOBAL VARIABLES ---
       const firebaseConfig = JSON.parse(__firebase_config);
       const app = initializeApp(firebaseConfig);
       const auth = getAuth(app);
       const db = getFirestore(app);
       const appId = typeof __app_id !== 'undefined' ? __app_id : 'sonic-wave-v1000';
       const apiKey = "";


       const scoreEl = document.getElementById('score-display');
       const coinEl = document.getElementById('coin-count');
       const cheatBox = document.getElementById('cheat-box');
       const cheatStatus = document.getElementById('cheat-status');


       let user = null;
       let totalCoins = 0;
       let activeShopPowerups = [];
       let isCheatActive = false;
       let lastChaChingTime = 0;
       let chaChingAudioBlob = null;
      
       // --- COOL BACKGROUND SETUP ---
       const bgParticles = [];
       for(let i=0; i<100; i++) {
           bgParticles.push({
               x: Math.random() * window.innerWidth,
               y: Math.random() * window.innerHeight,
               size: Math.random() * 3 + 1,
               speed: Math.random() * 2 + 0.5,
               color: `rgba(${Math.random()*100+155}, ${Math.random()*100+155}, 255, ${Math.random()})`
           });
       }


       // --- AUDIO ENGINE ---
       async function prepareAudio() {
           try {
               const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({
                       contents: [{ parts: [{ text: "Say excitedly: Cha-ching!" }] }],
                       generationConfig: {
                           responseModalities: ["AUDIO"],
                           speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                       }
                   })
               });
               const result = await response.json();
               const base64Audio = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
               if (base64Audio) {
                   const binary = atob(base64Audio);
                   const array = new Uint8Array(binary.length);
                   for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
                   chaChingAudioBlob = new Blob([createWavHeader(array.buffer, 24000)], { type: 'audio/wav' });
               }
           } catch (e) {}
       }


       function createWavHeader(pcmBuffer, sampleRate) {
           const buffer = new ArrayBuffer(44 + pcmBuffer.byteLength);
           const view = new DataView(buffer);
           const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
           writeString(0, 'RIFF'); view.setUint32(4, 36 + pcmBuffer.byteLength, true);
           writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
           view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
           view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
           writeString(36, 'data'); view.setUint32(40, pcmBuffer.byteLength, true);
           new Uint8Array(buffer, 44).set(new Uint8Array(pcmBuffer)); return buffer;
       }


       function playChaChing() {
           const now = Date.now();
           if (!chaChingAudioBlob || now - lastChaChingTime < 150) return;
           lastChaChingTime = now;
           const audio = new Audio(URL.createObjectURL(chaChingAudioBlob));
           audio.volume = 0.3; audio.play().catch(() => {});
       }


       const basePowers = [
           { id: 'shield', name: 'Shield', icon: '🛡️', cost: 10, type: 'SHIELD' },
           { id: 'ghost', name: 'Ghost', icon: '👻', cost: 25, type: 'GHOST' },
           { id: 'time', name: 'Time', icon: '⏳', cost: 20, type: 'TIME' },
           { id: 'magnet', name: 'Magnet', icon: '🧲', cost: 30, type: 'MAGNET' },
           { id: 'mini', name: 'Mini-Bird', icon: '🔎', cost: 15, type: 'MINI' },
           { id: 'lowgrav', name: 'Low-Grav', icon: '🎈', cost: 40, type: 'LOWGRAV' },
           { id: 'star', name: 'Star', icon: '🌟', cost: 100, type: 'STAR' }
       ];


       const shopItems = [];
       for(let i=1; i<=1000; i++) {
           const base = basePowers[(i-1) % basePowers.length];
           shopItems.push({ idx: i, id: `${base.id}_v${i}`, name: `${base.name} Lvl ${Math.ceil(i/basePowers.length)}`, icon: base.icon, cost: 50 + (i * 100), type: base.type });
       }


       window.renderShop = function() {
           const area = document.getElementById('shop-scroll-area');
           if (!area) return;
           area.innerHTML = shopItems.map(item => {
               const isBought = activeShopPowerups.some(p => p.id === item.id);
               const canAfford = totalCoins >= item.cost;
               return `<div class="shop-card">
                   <span class="text-lg">${item.icon}</span>
                   <span class="text-[7px] font-bold uppercase leading-tight text-center">${item.name}</span>
                   <button id="btn-${item.id}" class="ai-btn text-[8px] py-1 px-0 w-full ${isBought ? 'bg-green-600' : ''}" ${(isBought || !canAfford) ? 'disabled' : ''} onclick="buyItem('${item.id}')">${isBought ? 'READY' : '🟡 ' + item.cost.toLocaleString()}</button>
               </div>`;
           }).join('');
       };


       window.buyItem = async (itemId) => {
           const item = shopItems.find(i => i.id === itemId);
           if (!user || totalCoins < item.cost || activeShopPowerups.some(p => p.id === itemId)) return;
           totalCoins -= item.cost; activeShopPowerups.push(item);
           const economyRef = doc(db, 'artifacts', appId, 'users', user.uid, 'economy', 'wallet');
           await setDoc(economyRef, { totalCoins }, { merge: true });
           coinEl.innerText = totalCoins.toLocaleString(); window.renderShop();
       };


       cheatBox.addEventListener('input', (e) => {
           if (e.target.value.toLowerCase() === 'flapflapflap') {
               isCheatActive = true;
               cheatStatus.innerText = "ACCESS GRANTED: BILLIONAIRE MODE ACTIVE 🕶️🤵👟";
               cheatStatus.style.color = "#4ade80";
           } else {
               isCheatActive = false;
               cheatStatus.innerText = "Encryption Locked. Awaiting clearance...";
               cheatStatus.style.color = "rgba(255,255,255,0.2)";
           }
       });


       function drawBird(x, y, w, h, velocity, isInvincible) {
           ctx.save();
           ctx.translate(x + w/2, y + h/2);
           let rotation = Math.min(Math.PI/4, Math.max(-Math.PI/4, velocity * 0.1));
           ctx.rotate(rotation);
           if (isInvincible) {
               ctx.shadowBlur = 20;
               ctx.shadowColor = `hsl(${timer * 5 % 360}, 100%, 50%)`;
               ctx.fillStyle = `hsl(${timer * 5 % 360}, 100%, 50%)`;
           } else {
               ctx.fillStyle = '#fbbf24';
           }
           ctx.beginPath(); ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI * 2); ctx.fill();
           ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
           if (isCheatActive) {
               ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(-10, -5); ctx.lineTo(10, -5); ctx.lineTo(0, 15); ctx.closePath(); ctx.fill();
               ctx.fillStyle = '#000'; ctx.beginPath(); ctx.moveTo(-20, -5); ctx.lineTo(-10, -5); ctx.lineTo(0, 15); ctx.lineTo(-20, 10); ctx.closePath(); ctx.fill();
               ctx.beginPath(); ctx.moveTo(20, -5); ctx.lineTo(10, -5); ctx.lineTo(0, 15); ctx.lineTo(20, 10); ctx.closePath(); ctx.fill();
               ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.moveTo(-4, -5); ctx.lineTo(4, -1); ctx.lineTo(4, -9); ctx.closePath(); ctx.fill();
               ctx.beginPath(); ctx.moveTo(4, -5); ctx.lineTo(-4, -1); ctx.lineTo(-4, -9); ctx.closePath(); ctx.fill();
               ctx.beginPath(); ctx.arc(0, -5, 2, 0, Math.PI*2); ctx.fill();
           }
           ctx.fillStyle = isCheatActive ? '#333' : '#fff';
           let wingY = Math.sin(timer * 0.3) * 5;
           ctx.beginPath(); ctx.ellipse(-8, wingY, 10, 6, rotation * 0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
           ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(10, -5, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
           ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(12, -5, 2, 0, Math.PI * 2); ctx.fill();
           if (isCheatActive) {
               ctx.fillStyle = '#a855f7'; ctx.beginPath(); ctx.roundRect(4, -12, 22, 10, 2); ctx.fill();
               ctx.fillStyle = '#000'; ctx.beginPath(); ctx.roundRect(6, -10, 18, 6, 1); ctx.fill();
           }
           ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(28, 5); ctx.lineTo(18, 10); ctx.closePath(); ctx.fill(); ctx.stroke();
           if (isCheatActive) {
               ctx.fillStyle = '#fff'; ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
               ctx.beginPath(); ctx.roundRect(-15, 12, 12, 8, 3); ctx.fill(); ctx.stroke();
               ctx.beginPath(); ctx.roundRect(2, 12, 12, 8, 3); ctx.fill(); ctx.stroke();
           }
           ctx.restore();
       }


       const canvas = document.getElementById('gameCanvas');
       const ctx = canvas.getContext('2d');
       let state = 'START'; let score = 0; let multiplier = 1; let obstacles = []; let items = []; let coinsInLevel = []; let floatingTexts = []; let timer = 0;
       let worldSpeedMultiplier = 1;
      
       const player = { x: 80, y: 0, w: 42, h: 32, vel: 0, grav: 0.5, hasShield: false, magnetTimer: 0, miniTimer: 0, invincibleTimer: 0, lowGravTimer: 0 };


       function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
       window.addEventListener('resize', resize); resize();


       function drawPipe(x, topH, bottomY) {
           const pipeW = 80; const capW = 90; const capH = 30;
           ctx.fillStyle = isCheatActive ? '#064e3b' : '#22c55e';
           ctx.strokeStyle = isCheatActive ? '#facc15' : '#064e3b';
           ctx.lineWidth = 3;
           ctx.fillRect(x, 0, pipeW, topH); ctx.strokeRect(x, 0, pipeW, topH);
           ctx.fillRect(x - (capW-pipeW)/2, topH - capH, capW, capH); ctx.strokeRect(x - (capW-pipeW)/2, topH - capH, capW, capH);
           ctx.fillRect(x, bottomY, pipeW, canvas.height - bottomY); ctx.strokeRect(x, bottomY, pipeW, canvas.height - bottomY);
           ctx.fillRect(x - (capW-pipeW)/2, bottomY, capW, capH); ctx.strokeRect(x - (capW-pipeW)/2, bottomY, capW, capH);
       }


       function startGame() {
           if (state === 'PLAYING') return;
           state = 'PLAYING'; score = 0; timer = 0; worldSpeedMultiplier = 1;
           obstacles = []; coinsInLevel = []; floatingTexts = [];
           player.w = 42; player.h = 32; player.grav = 0.5; player.hasShield = false;
           player.magnetTimer = 0; player.miniTimer = 0; player.invincibleTimer = 0; player.lowGravTimer = 0;
           activeShopPowerups.forEach(p => {
               if (p.type === 'SHIELD') player.hasShield = true;
               if (p.type === 'MAGNET') player.magnetTimer = 600;
               if (p.type === 'MINI') player.miniTimer = 600;
               if (p.type === 'LOWGRAV') player.lowGravTimer = 600;
               if (p.type === 'STAR') player.invincibleTimer = 600;
           });
           activeShopPowerups = [];
           player.y = canvas.height / 2; player.vel = 0;
           document.getElementById('game-ui').classList.add('hidden');
       }


       function handleInput(e) {
           if (e.target.closest('button') || e.target.closest('#shop-scroll-area') || e.target.id === 'cheat-box') return;
           if (state !== 'PLAYING') startGame(); else player.vel = player.lowGravTimer > 0 ? -6 : -8;
       }


       document.getElementById('start-button').addEventListener('click', startGame);
       window.addEventListener('mousedown', handleInput);
       window.addEventListener('touchstart', (e) => { if (e.target.id !== 'cheat-box' && !e.target.closest('button')) e.preventDefault(); handleInput(e); }, { passive: false });


       function loop() {
           // --- COOL GRADIENT BACKGROUND ---
           let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
           if (isCheatActive) {
               grad.addColorStop(0, '#0f172a'); // Blackish
               grad.addColorStop(1, '#422006'); // Deep Gold/Brown
           } else {
               grad.addColorStop(0, '#1e1b4b'); // Deep Blue
               grad.addColorStop(1, '#0ea5e9'); // Sky Blue
           }
           ctx.fillStyle = grad;
           ctx.fillRect(0, 0, canvas.width, canvas.height);


           // --- COOL PARALLAX PARTICLES ---
           bgParticles.forEach(p => {
               p.x -= p.speed;
               if(p.x < -10) p.x = canvas.width + 10;
               ctx.fillStyle = isCheatActive ? `rgba(250, 204, 21, ${Math.random()})` : p.color;
               ctx.beginPath();
               ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
               ctx.fill();
           });


           if (state === 'PLAYING') {
               if (player.magnetTimer > 0) player.magnetTimer--;
               if (player.miniTimer > 0) { player.miniTimer--; player.w = 21; player.h = 16; } else { player.w = 42; player.h = 32; }
               if (player.invincibleTimer > 0) { player.invincibleTimer--; worldSpeedMultiplier = 2; } else { worldSpeedMultiplier = 1; }
               if (player.lowGravTimer > 0) { player.lowGravTimer--; player.grav = 0.25; } else { player.grav = 0.5; }
               player.vel += player.grav; player.y += player.vel;
               if (player.y < 0 || player.y + player.h > canvas.height) endGame();
               timer++;
               if (isCheatActive) { for(let i = 0; i < 167; i++) coinsInLevel.push({ x: canvas.width + (Math.random() * 100), y: Math.random() * (canvas.height - 20), w: 15, h: 15 }); }
               else { if (timer % 40 === 0) coinsInLevel.push({ x: canvas.width, y: Math.random() * (canvas.height - 25), w: 25, h: 25 }); }
               if (timer % 120 === 0) { let gap = 200; let top = Math.random() * (canvas.height - 400) + 100; obstacles.push({ x: canvas.width, w: 80, t: top, b: top + gap, p: false }); }
               ctx.fillStyle = "#fef08a"; ctx.shadowBlur = 5; ctx.shadowColor = "#facc15";
               coinsInLevel.forEach((coin, i) => {
                   if (player.magnetTimer > 0) {
                       const dx = (player.x + player.w/2) - (coin.x + coin.w/2);
                       const dy = (player.y + player.h/2) - (coin.y + coin.h/2);
                       const dist = Math.sqrt(dx*dx + dy*dy);
                       if (dist < 400) { coin.x += dx * 0.15; coin.y += dy * 0.15; }
                   }
                   coin.x -= (6 * worldSpeedMultiplier);
                   ctx.fillRect(coin.x, coin.y, coin.w, coin.h);
                   if (player.x < coin.x + coin.w && player.x + player.w > coin.x && player.y < coin.y + coin.h && player.y + player.h > coin.y) {
                       totalCoins += isCheatActive ? 1000000000 : 1;
                       playChaChing();
                       floatingTexts.push({ x: player.x + player.w, y: player.y, text: "cha ching!", life: 40, color: "#4ade80" });
                       coinsInLevel.splice(i, 1);
                   }
                   if (coin.x + 100 < 0) coinsInLevel.splice(i, 1);
               });
               coinEl.innerText = totalCoins.toLocaleString(); ctx.shadowBlur = 0;
               floatingTexts.forEach((ft, i) => { ft.y -= 1.5; ft.life--; ctx.fillStyle = ft.color; ctx.globalAlpha = ft.life / 40; ctx.font = "bold 14px Inter"; ctx.fillText(ft.text, ft.x, ft.y); ctx.globalAlpha = 1.0; if (ft.life <= 0) floatingTexts.splice(i, 1); });
               obstacles.forEach((o, i) => {
                   o.x -= (4 * worldSpeedMultiplier);
                   if (player.x + player.w > o.x && player.x < o.x + o.w && (player.y < o.t || player.y + player.h > o.b)) {
                       if (player.invincibleTimer > 0) { obstacles.splice(i, 1); floatingTexts.push({ x: o.x, y: o.t, text: "SMASH!", life: 30, color: "#fff" }); }
                       else if (player.hasShield) { player.hasShield = false; obstacles.splice(i, 1); }
                       else endGame();
                   }
                   if (!o.p && o.x + o.w < player.x) { score++; scoreEl.innerText = score.toLocaleString(); o.p = true; }
               });
           }
           obstacles.forEach(o => drawPipe(o.x, o.t, o.b));
           drawBird(player.x, player.y, player.w, player.h, player.vel, player.invincibleTimer > 0);
           requestAnimationFrame(loop);
       }


       async function endGame() {
           state = 'GAMEOVER'; document.getElementById('game-ui').classList.remove('hidden');
           window.renderShop();
           if (user) {
               const economyRef = doc(db, 'artifacts', appId, 'users', user.uid, 'economy', 'wallet');
               await setDoc(economyRef, { totalCoins }, { merge: true });
               await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard'), { userId: user.uid, score, at: Date.now() });
           }
       }


       onAuthStateChanged(auth, async u => {
           user = u;
           if(user) {
               const ecoRef = doc(db, 'artifacts', appId, 'users', user.uid, 'economy', 'wallet');
               const snap = await getDoc(ecoRef);
               if (snap.exists()) { totalCoins = snap.data().totalCoins || 0; coinEl.innerText = totalCoins.toLocaleString(); }
               window.renderShop();
               onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard'), (s) => {
                   const d = []; s.forEach(doc => d.push(doc.data()));
                   document.getElementById('leaderboard-list').innerHTML = d.sort((a, b) => b.score - a.score).slice(0, 5).map((entry, i) => `
                       <div class="flex justify-between text-[8px] p-1 border-b border-white/5 items-center">
                           <span class="${entry.isAdmin ? 'admin-entry' : ''}">${i+1}. Pilot ${entry.userId.slice(0,4)}</span>
                           <span>${entry.score.toLocaleString()}</span>
                       </div>`).join('');
               });
           }
       });


       const initAuth = async () => {
           if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
           else await signInAnonymously(auth);
           prepareAudio();
       };
       initAuth(); loop();
       document.getElementById('terraform-btn').onclick = (e) => { e.stopPropagation(); window.askGemini("Create a theme").then(res => { }); };
   </script>
</body>
</html>
