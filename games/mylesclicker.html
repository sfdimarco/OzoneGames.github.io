<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myles Clicker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation; 
        }
        .game-title { 
            font-family: 'Pacifico', cursive;
        }
        .click-button { 
            transition: transform 0.1s ease-out;
            user-select: none; 
            -webkit-user-select: none;
            cursor: pointer;
        }
        .click-button:active {
            transform: scale(0.9);
        }
        .upgrade-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .floating-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fbbf24; /* amber-400 */
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
        .message-box {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .message-box.show {
            opacity: 1;
        }
        .stickman-svg {
            width: 120px; 
            height: 120px; 
        }
        @media (min-width: 768px) { /* md breakpoint */
            .stickman-svg {
                width: 150px;
                height: 150px;
            }
        }
        .kirbin-time-text {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem; 
            font-weight: bold;
            font-family: 'Pacifico', cursive; 
            color: #10B981; /* emerald-500 */
            text-shadow: 2px 2px 0px #065f46, 4px 4px 0px #047857; 
            z-index: 2000; 
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            will-change: opacity, transform; 
        }
        .kirbin-time-text.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1); 
        }
        /* Travis Warning Style */
        #travis-warning {
            position: fixed;
            top: 20px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: #ef4444; /* red-500 */
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 1500; 
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            transition: opacity 0.5s ease-in-out, transform 0.3s ease-out;
        }
        #travis-warning.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(-100%); 
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-sky-50 text-gray-800 flex flex-col items-center justify-center min-h-screen p-4 selection:bg-sky-300 selection:text-sky-900">

    <div id="travis-warning" class="hidden">
        TRAVIS HAS APPEARED! You are losing points!
    </div>

    <div class="w-full max-w-3xl bg-white shadow-xl rounded-lg p-6 mt-16 md:mt-10">
        <header class="text-center mb-6">
            <h1 class="text-5xl game-title text-sky-600">Myles Clicker</h1>
            <p id="user-id-display" class="text-xs text-gray-500 mt-1">User ID: Loading...</p>
        </header>

        <main class="flex flex-col md:flex-row gap-6">
            <section class="flex-1 flex flex-col items-center justify-center bg-sky-100 p-6 rounded-lg shadow relative">
                <div id="points-display" class="text-center mb-4">
                    <p class="text-4xl font-bold text-sky-700"><span id="points-count">0</span></p>
                    <p class="text-sm text-sky-600">Points</p>
                </div>
                <div id="stats-display" class="text-center mb-4 text-sm text-sky-600">
                    <p><span id="pps-display">0</span> points per second</p>
                    <p><span id="ppc-display">1</span> point per click</p>
                </div>
                <div id="click-button-container" class="relative">
                    <button id="myles-button" class="click-button p-2 rounded-full focus:outline-none focus:ring-4 focus:ring-sky-300 active:bg-sky-200" aria-label="Click to get points">
                        <svg class="stickman-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="25" r="20" fill="#333" />
                            <circle cx="40" cy="20" r="15" fill="#333" />
                            <circle cx="60" cy="20" r="15" fill="#333" />
                            <circle cx="50" cy="15" r="10" fill="#333" />
                            <circle cx="45" cy="30" r="12" fill="#333" />
                            <circle cx="55" cy="30" r="12" fill="#333" />
                            <circle cx="50" cy="35" r="10" fill="#F0DBC1" stroke="#000" stroke-width="1" />
                            <line x1="50" y1="45" x2="50" y2="70" stroke="#000" stroke-width="2" />
                            <line x1="50" y1="55" x2="30" y2="45" stroke="#000" stroke-width="2" />
                            <line x1="50" y1="55" x2="68" y2="65" stroke="#000" stroke-width="2" />
                            <polygon points="60,70 80,70 70,45" fill="green" stroke="darkgreen" stroke-width="1" />
                            <line x1="50" y1="70" x2="40" y2="90" stroke="#000" stroke-width="2" />
                            <line x1="50" y1="70" x2="60" y2="90" stroke="#000" stroke-width="2" />
                        </svg>
                    </button>
                </div>
            </section>

            <section class="flex-1 bg-teal-50 p-6 rounded-lg shadow">
                <h2 class="text-2xl font-semibold text-teal-700 mb-4 text-center md:text-left">Upgrades</h2>
                <div id="upgrades-container" class="space-y-3">
                    <!-- Upgrades generated here -->
                </div>
            </section>
        </main>

        <footer class="text-center mt-6">
            <button id="reset-button" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-md shadow text-sm">Reset Game</button>
            <p class="text-xs text-gray-400 mt-2">Your progress is saved automatically!</p>
        </footer>
    </div>

    <!-- Modals and Alerts -->
    <div id="custom-message-box" class="message-box bg-gray-800 text-white">
        <span id="custom-message-text"></span>
    </div>
    
    <div id="confirmation-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center hidden z-50">
        <div class="p-8 border w-96 shadow-lg rounded-md bg-white">
            <div class="text-center">
                <h3 class="text-2xl font-bold text-gray-900" id="modal-title">Confirm Action</h3>
                <p class="text-sm text-gray-500 mt-2 mb-4" id="modal-message">Are you sure you want to proceed?</p>
                <div class="flex justify-center space-x-4">
                    <button id="modal-confirm-button" class="px-4 py-2 bg-red-500 text-white text-base font-medium rounded-md shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-300">
                        Confirm
                    </button>
                    <button id="modal-cancel-button" class="px-4 py-2 bg-gray-200 text-gray-800 text-base font-medium rounded-md shadow-sm hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-300">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
// === OFFLINE SHIM: replaces Firebase with localStorage leaderboard ===
(function(){
  const LS = 'oz_lb_' + location.pathname.split('/').pop();
  window.__firebase_config = '{"projectId":"offline"}';
  window.__app_id = 'offline';
  window.__initial_auth_token = null;
  window.initializeApp  = function(){ return {}; };
  window.getAuth        = function(){ return {}; };
  window.getFirestore   = function(){ return {}; };
  window.signInAnonymously     = function(){ return Promise.resolve(); };
  window.signInWithCustomToken = function(){ return Promise.resolve(); };
  window.onAuthStateChanged = function(auth, cb){
    setTimeout(function(){ cb({uid:'local-'+Math.random().toString(36).slice(2,8)}); }, 80);
  };
  window.collection = function(){ return {_k: LS}; };
  window.doc        = function(){ return {_k: LS}; };
  window.getDoc     = function(){ return Promise.resolve({exists:function(){return false;},data:function(){return null;}}); };
  window.setDoc     = function(){ return Promise.resolve(); };
  window.addDoc = function(col, data){
    var arr = JSON.parse(localStorage.getItem(col._k||LS)||'[]');
    arr.push(data); arr.sort(function(a,b){return (b.score||0)-(a.score||0);});
    localStorage.setItem(col._k||LS, JSON.stringify(arr.slice(0,20)));
    return Promise.resolve({id: Date.now().toString()});
  };
  window.onSnapshot = function(col, cb){
    var arr = JSON.parse(localStorage.getItem(col._k||LS)||'[]');
    var fake = arr.map(function(d){ return {data:function(){return d;}, id:Math.random().toString(36)}; });
    cb({forEach:function(fn){fake.forEach(fn);}, docs:fake}); return function(){};
  };
  window.getDocs = function(col){
    var arr = JSON.parse(localStorage.getItem(col._k||LS)||'[]');
    var fake = arr.map(function(d){ return {data:function(){return d;}, id:Math.random().toString(36)}; });
    return Promise.resolve({forEach:function(fn){fake.forEach(fn);}, docs:fake});
  };
})();
// === END SHIM ===
        // Firebase configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(window.__firebase_config) : {}; 
        const appId = window.__app_id || 'offline'; 

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Game state variables
        let points = 0; 
        let userId = null;
        let isAuthReady = false;
        let gameDocRef = null;
        let unsubscribeGameState = null; 

        const initialUpgrades = {
            cursor: { id: 'cursor', name: 'Super Clicker', type: 'ppc', baseCost: 15, baseValue: 1, owned: 0, icon: '👆', description: '+1 point per click' }, 
            grandma: { id: 'grandma', name: 'Grandma Myles', type: 'pps', baseCost: 100, baseValue: 1, owned: 0, icon: '👵', description: '+1 point per second' }, 
            farm: { id: 'farm', name: 'Point Farm', type: 'pps', baseCost: 1100, baseValue: 8, owned: 0, icon: '🌾', description: '+8 points per second' },
            mine: { id: 'mine', name: 'Point Mine', type: 'pps', baseCost: 12000, baseValue: 47, owned: 0, icon: '⛏️', description: '+47 points per second' },
            factory: { id: 'factory', name: 'Point Factory', type: 'pps', baseCost: 130000, baseValue: 260, owned: 0, icon: '🏭', description: '+260 points per second' },
            bank: { id: 'bank', name: 'Point Bank', type: 'pps', baseCost: 1400000, baseValue: 1400, owned: 0, icon: '🏦', description: '+1.4k points per second' },
            temple: { id: 'temple', name: 'Point Temple', type: 'pps', baseCost: 20000000, baseValue: 7800, owned: 0, icon: '🏛️', description: '+7.8k points per second' },
        };
        let upgrades = JSON.parse(JSON.stringify(initialUpgrades)); 

        // DOM Elements
        const pointsCountDisplay = document.getElementById('points-count'); 
        const mylesButton = document.getElementById('myles-button'); 
        const clickButtonContainer = document.getElementById('click-button-container'); 
        const ppsDisplay = document.getElementById('pps-display'); 
        const ppcDisplay = document.getElementById('ppc-display'); 
        const upgradesContainer = document.getElementById('upgrades-container');
        const userIdDisplay = document.getElementById('user-id-display');
        const resetButton = document.getElementById('reset-button');
        const travisWarningElement = document.getElementById('travis-warning'); 
        
        const confirmationModal = document.getElementById('confirmation-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalConfirmButton = document.getElementById('modal-confirm-button');
        const modalCancelButton = document.getElementById('modal-cancel-button');

        // Travis Event Variables
        let isTravisActive = false;
        let travisTimer = 0; 
        let nextTravisAttemptTimer = 20; 
        const TRAVIS_BASE_DURATION_SECONDS = 15; 
        const TRAVIS_SPAWN_INTERVAL_SECONDS = 45; 
        const TRAVIS_SPAWN_CHANCE = 0.30; 

        // --- Authentication ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userId = user.uid;
                userIdDisplay.textContent = `User ID: ${userId.substring(0, 8)}...`;
                
                // Set the correct Firestore path for private game data (added 'save' doc ID to make it an even number of segments)
                gameDocRef = doc(db, 'artifacts', appId, 'users', userId, 'gamedata', 'save'); 
                
                isAuthReady = true;
                loadGameState(); 
            } else {
                userId = null;
                isAuthReady = false;
                userIdDisplay.textContent = "User ID: Not signed in";
                if (unsubscribeGameState) unsubscribeGameState(); 
                if(isTravisActive) deactivateTravis(false); 
            }
            updateDisplay(); 
        });

        async function initializeAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error", error);
                userIdDisplay.textContent = "Error logging in";
            }
        }
        
        // --- Game Logic ---
        function calculatePointsPerClick() { 
            let ppc = 1; 
            for (const key in upgrades) {
                if (upgrades[key].type === 'ppc') { 
                    ppc += (upgrades[key].baseValue * upgrades[key].owned);
                }
            }
            return ppc;
        }

        function calculatePointsPerSecond() { 
            let pps = 0;
            for (const key in upgrades) {
                if (upgrades[key].type === 'pps') { 
                    pps += (upgrades[key].baseValue * upgrades[key].owned);
                }
            }
            return pps;
        }

        function getUpgradeCost(upgradeKey) {
            const upgrade = upgrades[upgradeKey];
            if (!upgrade) return Infinity;
            return Math.ceil(upgrade.baseCost * Math.pow(1.15, upgrade.owned));
        }
        
        function formatNumber(num) {
            if (num < 0) num = 0; 
            if (num < 1000) return Math.floor(num).toString();
            if (num < 1000000) return (num / 1000).toFixed(1) + 'K';
            if (num < 1000000000) return (num / 1000000).toFixed(1) + 'M';
            return (num / 1000000000).toFixed(1) + 'B';
        }

        function updateDisplay() {
            if (!isAuthReady) {
                pointsCountDisplay.textContent = '...'; 
                return;
            }
            pointsCountDisplay.textContent = formatNumber(points); 
            const currentPps = calculatePointsPerSecond(); 
            const currentPpc = calculatePointsPerClick(); 
            ppsDisplay.textContent = formatNumber(currentPps);
            ppcDisplay.textContent = formatNumber(currentPpc);

            if (isTravisActive) {
                travisWarningElement.textContent = `TRAVIS HAS APPEARED! Losing points for ${travisTimer}s!`;
            }

            upgradesContainer.innerHTML = ''; 
            Object.keys(upgrades).forEach(key => {
                const upgrade = upgrades[key];
                const cost = getUpgradeCost(key);
                const upgradeElement = document.createElement('div');
                upgradeElement.className = 'bg-white p-3 rounded-md shadow border border-teal-200 flex items-center justify-between';
                upgradeElement.innerHTML = `
                    <div class="flex items-center">
                        <span class="text-2xl mr-3">${upgrade.icon}</span>
                        <div>
                            <h3 class="font-semibold text-teal-600">${upgrade.name} <span class="text-xs text-gray-500">(Owned: ${upgrade.owned})</span></h3>
                            <p class="text-xs text-gray-500">${upgrade.description}</p>
                            <p class="text-xs text-teal-500">Cost: ${formatNumber(cost)}</p>
                        </div>
                    </div>
                    <button data-upgrade-key="${key}" class="buy-upgrade-button px-3 py-1.5 bg-teal-400 hover:bg-teal-500 text-white rounded-md text-sm shadow focus:outline-none focus:ring-2 focus:ring-teal-300">Buy</button>
                `;
                upgradesContainer.appendChild(upgradeElement);
                
                const buyButton = upgradeElement.querySelector('.buy-upgrade-button');
                if (points < cost) { 
                    buyButton.disabled = true;
                    buyButton.classList.add('opacity-50', 'cursor-not-allowed');
                }
                buyButton.addEventListener('click', () => buyUpgrade(key));
            });
        }

        function clickMyles() { 
            if (!isAuthReady) return;
            const ppc = calculatePointsPerClick();
            points += ppc; 
            showFloatingText(`+${formatNumber(ppc)}`, mylesButton); 
            updateDisplay();
        }

        function showKirbinTimeText() {
            const kirbinText = document.createElement('div');
            kirbinText.textContent = "it's kirbin time";
            kirbinText.className = 'kirbin-time-text';

            document.body.appendChild(kirbinText);

            requestAnimationFrame(() => {
                requestAnimationFrame(() => { 
                    kirbinText.classList.add('show');
                });
            });
            
            setTimeout(() => {
                kirbinText.classList.remove('show'); 
                setTimeout(() => {
                    if (kirbinText.parentNode) { 
                       kirbinText.remove();
                    }
                }, 800); 
            }, 1200); 
        }

        function buyUpgrade(key) {
            if (!isAuthReady) return;
            const upgrade = upgrades[key];
            if (!upgrade) return;

            const cost = getUpgradeCost(key);
            if (points >= cost) { 
                points -= cost; 
                upgrade.owned++;
                showCustomMessage(`${upgrade.name} purchased!`, 'success');
                showKirbinTimeText(); 
                updateDisplay();
                saveGameState(); 
            } else {
                showCustomMessage('Not enough points!', 'error'); 
            }
        }
        
        function showFloatingText(text, element) {
            const floatingText = document.createElement('div');
            floatingText.className = 'floating-text';
            floatingText.textContent = text;
            
            const rect = element.getBoundingClientRect();
            const containerRect = clickButtonContainer.getBoundingClientRect(); 
            
            floatingText.style.left = `${rect.left - containerRect.left + rect.width / 2 - 15}px`; 
            floatingText.style.top = `${rect.top - containerRect.top - 20}px`; 

            clickButtonContainer.appendChild(floatingText);
            floatingText.addEventListener('animationend', () => {
                floatingText.remove();
            });
        }

        let messageTimeout;
        function showCustomMessage(message, type = 'info') {
            const messageBox = document.getElementById('custom-message-box');
            const messageText = document.getElementById('custom-message-text');

            messageText.textContent = message;
            messageBox.className = 'message-box show'; 
            if (type === 'success') {
                messageBox.classList.add('bg-green-500', 'text-white');
            } else if (type === 'error') {
                messageBox.classList.add('bg-red-500', 'text-white');
            } else { 
                messageBox.classList.add('bg-sky-500', 'text-white'); 
            }

            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                messageBox.classList.remove('show');
            }, 3000);
        }

        // --- Travis Event Logic ---
        function activateTravis() {
            if (!isAuthReady) return; 
            isTravisActive = true;
            travisTimer = TRAVIS_BASE_DURATION_SECONDS + Math.floor(Math.random() * 6) - 2; 
            travisWarningElement.textContent = `TRAVIS HAS APPEARED! Losing points for ${travisTimer}s!`;
            travisWarningElement.classList.remove('hidden');
            showCustomMessage('TRAVIS IS HERE! Watch your points!', 'error');
        }

        function deactivateTravis(showMessage = true) {
            isTravisActive = false;
            travisWarningElement.classList.add('hidden');
            if (showMessage) {
                showCustomMessage('Travis is gone... for now.', 'success');
            }
        }

        // --- Game Loop (for PPS and Travis) ---
        let lastSaveTime = Date.now();
        const SAVE_INTERVAL = 10000; 

        setInterval(() => {
            if (!isAuthReady || !userId) return; 

            const currentTime = Date.now();
            let pps = calculatePointsPerSecond();
            
            // PPS income
            if (pps > 0) {
                points += pps; 
            }

            // Travis Spawn Logic
            nextTravisAttemptTimer--;
            if (nextTravisAttemptTimer <= 0) {
                nextTravisAttemptTimer = TRAVIS_SPAWN_INTERVAL_SECONDS + Math.floor(Math.random() * 20 - 10); 
                if (!isTravisActive && Math.random() < TRAVIS_SPAWN_CHANCE) {
                    activateTravis();
                }
            }

            // Travis Active Logic
            if (isTravisActive) {
                travisTimer--;
                let deduction = Math.min(1000, Math.max(2, Math.floor(pps * 0.5))); 
                points -= deduction;
                if (points < 0) points = 0; 

                travisWarningElement.textContent = `TRAVIS HAS APPEARED! Losing points for ${travisTimer}s!`;

                if (travisTimer <= 0) {
                    deactivateTravis();
                }
            }
            
            updateDisplay();

            if (currentTime - lastSaveTime > SAVE_INTERVAL) {
                saveGameState();
                lastSaveTime = currentTime;
            }

        }, 1000); 

        // --- Firestore Data Handling ---
        async function saveGameState() {
            if (!isAuthReady || !gameDocRef) return;
            const gameState = {
                points: points, 
                upgrades: upgrades, 
                timestamp: new Date().toISOString()
            };
            try {
                await setDoc(gameDocRef, gameState); 
            } catch (error) {
                console.error("Error saving game state", error);
            }
        }

        function loadGameState() {
            if (!isAuthReady || !gameDocRef) return;
            
            if (unsubscribeGameState) unsubscribeGameState(); 

            unsubscribeGameState = onSnapshot(gameDocRef, (docSnap) => {
                if (!isAuthReady) return; 
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    points = data.points || 0; 
                    
                    const loadedUpgrades = data.upgrades || {};
                    upgrades = JSON.parse(JSON.stringify(initialUpgrades)); 
                    for (const key in upgrades) {
                        if (loadedUpgrades[key]) {
                            upgrades[key].owned = loadedUpgrades[key].owned || 0;
                        }
                    }
                } else {
                    points = 0; 
                    upgrades = JSON.parse(JSON.stringify(initialUpgrades));
                    saveGameState(); 
                }
                updateDisplay();
            }, (error) => {
                console.error("Error listening to game state", error);
            });
        }
        
        // Confirmation Modal Logic
        let confirmCallback = null;
        function showConfirmationModal(title, message, onConfirm) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            confirmCallback = onConfirm;
            confirmationModal.classList.remove('hidden');
        }

        modalConfirmButton.addEventListener('click', () => {
            if (confirmCallback) confirmCallback();
            confirmationModal.classList.add('hidden');
            confirmCallback = null;
        });

        modalCancelButton.addEventListener('click', () => {
            confirmationModal.classList.add('hidden');
            confirmCallback = null;
        });

        async function resetGameData() {
            if (!isAuthReady || !gameDocRef) {
                showCustomMessage('Cannot reset: Game not fully loaded.', 'error');
                return;
            }
            showConfirmationModal(
                'Reset Game',
                'Are you sure you want to reset all your progress? This cannot be undone.',
                async () => {
                    points = 0; 
                    upgrades = JSON.parse(JSON.stringify(initialUpgrades)); 
                    if(isTravisActive) deactivateTravis(false); 
                    try {
                        await saveGameState(); 
                        showCustomMessage('Game has been reset!', 'success');
                    } catch (error) {
                        showCustomMessage('Error resetting game!', 'error');
                    }
                    updateDisplay(); 
                }
            );
        }

        // Event Listeners
        mylesButton.addEventListener('click', clickMyles); 
        resetButton.addEventListener('click', resetGameData);

        // Start everything up
        initializeAuth();
        
        window.addEventListener('beforeunload', () => {
            if (isAuthReady && userId) { 
                saveGameState(); 
            }
        });

    </script>
</body>
</html>
